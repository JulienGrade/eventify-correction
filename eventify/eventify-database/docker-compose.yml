services:
    postgres:
        image: postgres:16
        container_name: eventify-postgres
        restart: always
        environment:
            POSTGRES_USER: eventify
            POSTGRES_PASSWORD: eventifypassword
            POSTGRES_DB: eventify
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data

    pgadmin:
        image: dpage/pgadmin4
        container_name: eventify-pgadmin
        restart: always
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@eventify.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "5050:80"
        depends_on:
            - postgres
        volumes:
            - pgadmin-data:/var/lib/pgadmin

volumes:
    postgres-data:
    pgadmin-data:
